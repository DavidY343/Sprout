services:
  - type: web
    name: sprout-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: ALLOWED_ORIGINS
        sync: false

  - type: worker
    name: sprout-worker
    env: docker
    dockerfilePath: ./worker/Dockerfile
    # Note: Render doesn't offer a free tier for Background Workers. 
    # You will need at least a Starter plan (~$7/mo) for the worker, 
    # or you can run the worker locally.
    envVars:
      - key: DATABASE_URL
        fromService:
          type: web
          name: sprout-backend
          envVarKey: DATABASE_URL
      - key: PYTHONUNBUFFERED
        value: "1"
